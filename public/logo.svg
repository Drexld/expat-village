      <rect x="294" y="210" width="4" height="4" fill="#F59E0B" fill-opacity="0.45" rx="1"/>
      <rect x="285" y="222" width="4" height="4" fill="#F59E0B" fill-opacity="0.65" rx="1"/>

      <rect x="309" y="215" width="26" height="105" fill="url(#brandGrad)" fill-opacity="0.6" rx="2"/>
      <rect x="315" y="223" width="4" height="4" fill="#F59E0B" fill-opacity="0.55" rx="1"/>
      <rect x="325" y="223" width="4" height="4" fill="#F59E0B" fill-opacity="0.7" rx="1"/>
      <rect x="315" y="235" width="4" height="4" fill="#F59E0B" fill-opacity="0.6" rx="1"/>

      <rect x="339" y="232" width="20" height="88" fill="url(#brandGrad)" fill-opacity="0.5" rx="2"/>
      <rect x="345" y="240" width="4" height="4" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
      <rect x="345" y="252" width="4" height="4" fill="#F59E0B" fill-opacity="0.4" rx="1"/>
    </g>

    <line x1="148" y1="320" x2="372" y2="320" stroke="url(#goldGrad)" stroke-width="1.2" stroke-opacity="0.45"/>
  </g>

  <text x="420" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="url(#brandGrad)" letter-spacing="-1">Expat</text>
  <text x="420" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="url(#brandGrad)" letter-spacing="-1">Village</text>
  <rect x="420" y="282" width="180" height="2.5" rx="1.25" fill="url(#underlineFade)"/>
  <text x="424" y="315" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#94A3B8" letter-spacing="2.5" font-style="italic">Warsaw &amp; Beyond</text>

  <g opacity="0.55">
    <rect x="530" y="348" width="218" height="36" rx="18" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.35"/>
    <text x="639" y="372" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#A78BFA" text-anchor="middle" letter-spacing="1.2">By Expats · For Expats</text>
  </g>
</svg>
